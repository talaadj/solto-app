<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SOLTO v2</title>
    <style>
      #error-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:#fff; z-index:99999; padding:20px; font-family:sans-serif; }
      #error-overlay.show { display:block; }
      #error-overlay h2 { color:red; }
      #error-overlay pre { background:#f5f5f5; padding:10px; font-size:11px; overflow:auto; max-height:60vh; white-space:pre-wrap; word-break:break-all; }
    </style>
  </head>
  <body>
    <div id="error-overlay">
      <h2>⚠️ SOLTO v2 — Ошибка</h2>
      <p id="error-msg"></p>
      <pre id="error-stack"></pre>
      <button onclick="location.reload()" style="margin-top:10px;padding:10px 20px;background:#4f46e5;color:white;border:none;border-radius:8px;font-size:14px;">Перезагрузить</button>
    </div>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById('error-overlay');
        el.className = 'show';
        document.getElementById('error-msg').textContent = msg;
        document.getElementById('error-stack').textContent = (err && err.stack) || (src + ':' + line + ':' + col);
      };
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('error-overlay');
        el.className = 'show';
        document.getElementById('error-msg').textContent = 'Promise Error: ' + (e.reason && e.reason.message || e.reason);
        document.getElementById('error-stack').textContent = (e.reason && e.reason.stack) || String(e.reason);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
